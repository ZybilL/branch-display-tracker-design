<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio Tracker</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="page">
  <header class="topbar">
    <div>
      <p class="eyebrow">Dashboard</p>
      <h1>Portfolio</h1>
    </div>
    <div class="topbar-actions">
      <button id="refreshBtn" class="btn btn-ghost">↻ Refresh Prices</button>
      <button id="addBtn" class="btn btn-primary">+ Add Holding</button>
    </div>
  </header>

  <section class="stat-strip" id="statStrip"></section>
  <p id="unpricedNote" class="unpriced-note" hidden></p>

  <section class="panel">
    <div class="panel-header">
      <h2>Holdings</h2>
      <span id="holdingCount" class="muted"></span>
    </div>
    <div class="table-wrap">
      <table id="holdingsTable">
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Quantity</th>
            <th>Avg Cost/Share</th>
            <th>Current Price</th>
            <th>Market Value</th>
            <th>Gain/Loss</th>
            <th>Day Change</th>
            <th>Allocation</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="holdingsBody"></tbody>
      </table>
      <p id="emptyState" class="empty-state" hidden>No holdings yet. Click "+ Add Holding" to get started.</p>
    </div>
  </section>

  <section class="panel">
    <div class="panel-header">
      <h2>Allocation</h2>
    </div>
    <div id="allocationList" class="allocation-list"></div>
  </section>
</div>

<div id="modalOverlay" class="modal-overlay" hidden>
  <div class="modal">
    <h2 id="modalTitle">Add Holding</h2>
    <form id="holdingForm">
      <input type="hidden" id="holdingId" />
      <label>Ticker
        <input type="text" id="ticker" placeholder="e.g. AAPL" required />
      </label>
      <div class="field-row">
        <label>Quantity
          <input type="number" id="quantity" step="any" min="0" required />
        </label>
        <label>Avg Cost / Share
          <input type="number" id="costPerShare" step="any" min="0" required />
        </label>
      </div>
      <div class="field-row">
        <label>Purchase Date <span class="optional">(optional)</span>
          <input type="date" id="purchaseDate" />
        </label>
        <label>Manual Price Override <span class="optional">(optional)</span>
          <input type="number" id="manualPrice" step="any" min="0" placeholder="if ticker lookup fails" />
        </label>
      </div>
      <label>Notes <span class="optional">(optional)</span>
        <textarea id="notes" rows="2"></textarea>
      </label>
      <div class="modal-actions">
        <button type="button" id="cancelBtn" class="btn btn-ghost">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
